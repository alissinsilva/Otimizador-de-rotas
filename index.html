<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CircuitPro Professional</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial,Helvetica,sans-serif;
}

width:6px;
}

::-webkit-scrollbar-thumb{
background:#334155;
border-radius:20px;
}

background:#111827;
border:1px solid #1f2937;
border-radius:20px;
}

<body>

<div class="min-h-screen flex flex-col lg:flex-row">

<!-- MENU -->

<aside class="w-full lg:w-96 bg-slate-950 border-r border-slate-800 p-5">

<div class="flex items-center gap-3 mb-6">

<div class="bg-indigo-600 p-3 rounded-xl">
<i data-lucide="navigation"></i>
</div>

<div>
<h1 class="font-black text-xl">
CircuitPro
</h1>

<p class="text-xs text-indigo-400">
Logística Inteligente
</p>
</div>

</div>

<!-- FORM -->

<div class="card p-4 mb-5">

<label class="text-xs block mb-1">
ID DO PACOTE
</label>

<input
id="packageIdInput"
type="text"
class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 mb-3"
placeholder="#PK-001">

<label class="text-xs block mb-1">
ENDEREÇO
</label>

<input
id="addressInput"
type="text"
class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 mb-3"
placeholder="Digite o endereço">

<div class="grid grid-cols-2 gap-2">

<button
onclick="addStop()"
class="bg-indigo-600 p-3 rounded-xl font-bold">

Adicionar
</button>

<button
onclick="openScanner()"
class="bg-slate-800 p-3 rounded-xl">

OCR
</button>

</div>

</div>

<!-- IMPORTAÇÃO -->

<div class="card p-4 mb-5">

<h3 class="font-bold mb-3">
Importar CSV
</h3>

<input
type="file"
id="csvFile"
accept=".csv"
class="w-full text-sm">

<button
onclick="importCSV()"
class="mt-3 bg-emerald-600 p-3 rounded-xl w-full font-bold">

Importar Lista
</button>

</div>

<!-- ESTATÍSTICAS -->

<div class="card p-4 mb-5">

<h3 class="font-bold mb-4">
Estatísticas
</h3>

<div class="grid grid-cols-3 gap-3">

<div class="bg-slate-900 p-3 rounded-xl text-center">
<div id="pendingCount" class="text-xl font-black">
0
</div>
<div class="text-xs">
Pendentes
</div>
</div>

<div class="bg-slate-900 p-3 rounded-xl text-center">
<div id="deliveredCount" class="text-xl font-black text-emerald-400">
0
</div>
<div class="text-xs">
Entregues
</div>
</div>

<div class="bg-slate-900 p-3 rounded-xl text-center">
<div id="totalCount" class="text-xl font-black text-indigo-400">
0
</div>
<div class="text-xs">
Total
</div>
</div>

</div>

</div>

<button
onclick="optimizeRouteLocal()"
class="bg-emerald-600 w-full p-4 rounded-2xl font-black">

ROTEIRIZAR AGORA
</button>

</aside>

<!-- CONTEÚDO -->

<main class="flex-1 p-5">

<!-- GPS -->

<div class="card p-4 mb-5">

<div class="flex justify-between">

<div>

<h2 class="font-bold">
Posição Atual
</h2>

<p id="gpsStatus"
class="text-sm text-slate-400">
Obtendo GPS...
</p>

</div>

<div>

<button
onclick="getCurrentLocation()"
class="bg-indigo-600 px-4 py-2 rounded-xl">

Atualizar GPS
</button>

</div>

</div>

</div>

<!-- ENTREGA ATUAL -->

<div
id="currentDeliveryPanel"
class="card p-6 mb-5 hidden">

<div class="flex justify-between mb-4">

<div>

<p class="text-xs text-indigo-400">
ENTREGA ATUAL
</p>

<h2
id="currentPkgId"
class="text-2xl font-black">
-
</h2>

</div>

</div>

<h3
id="currentAddress"
class="text-lg mb-5">
-
</h3>

<div class="flex flex-wrap gap-3">

<button
onclick="openNextInGoogleMaps()"
class="bg-indigo-600 px-5 py-3 rounded-xl font-bold">

Abrir GPS
</button>

<button
onclick="completeCurrentDelivery()"
class="bg-emerald-600 px-5 py-3 rounded-xl font-bold">

Entregue
</button>

<button
onclick="excludeCurrentDelivery()"
class="bg-red-600 px-5 py-3 rounded-xl font-bold">

Excluir
</button>

</div>

</div>

<!-- PENDENTES -->

<div class="card p-5 mb-5">

<h2 class="font-bold mb-4">
Pendentes
</h2>

<ul
id="stopsList"
class="space-y-2">
</ul>

</div>

<!-- ENTREGUES -->

<div class="card p-5 mb-5">

<h2 class="font-bold text-emerald-400 mb-4">
Entregues
</h2>

<ul
id="deliveredList"
class="space-y-2">
</ul>

</div>

<!-- ROTA -->

<div class="card p-5">

<h2 class="font-bold mb-4">
Sequência da Rota
</h2>

<div
id="routeTimeline"
class="space-y-3">
</div>

</div>

</main>

</div>

<!-- MODAL OCR -->

<div
id="scannerModal"
class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center">

<div class="bg-slate-900 rounded-2xl p-4 w-full max-w-md">

<video
id="videoPreview"
autoplay
playsinline
class="w-full rounded-xl mb-3">
</video>

<div class="flex gap-2">

<button
onclick="captureAndProcess()"
class="bg-indigo-600 p-3 rounded-xl flex-1">

Capturar
</button>

<button
onclick="closeScanner()"
class="bg-red-600 p-3 rounded-xl flex-1">

Fechar
</button>

</div>

<canvas id="hiddenCanvas" class="hidden"></canvas>
<script>

lucide.createIcons();

/* =========================
   VARIÁVEIS GLOBAIS
========================= */

let stops = [];
let optimizedStops = [];
let deliveredStops = [];

let currentLatitude = null;
let currentLongitude = null;

let videoStream = null;

/* =========================
   LOCAL STORAGE
========================= */

function saveData() {

    localStorage.setItem(
        "circuitpro_stops",
        JSON.stringify(stops)
    );

    localStorage.setItem(
        "circuitpro_delivered",
        JSON.stringify(deliveredStops)
    );

    localStorage.setItem(
        "circuitpro_route",
        JSON.stringify(optimizedStops)
    );
}

function loadData() {

    const savedStops =
        localStorage.getItem("circuitpro_stops");

    const savedDelivered =
        localStorage.getItem("circuitpro_delivered");

    const savedRoute =
        localStorage.getItem("circuitpro_route");

    if(savedStops)
        stops = JSON.parse(savedStops);

    if(savedDelivered)
        deliveredStops =
        JSON.parse(savedDelivered);

    if(savedRoute)
        optimizedStops =
        JSON.parse(savedRoute);

    renderStops();
    renderDelivered();
    updateStats();
    updateDeliveryDashboard();
}

/* =========================
   ADICIONAR ENTREGA
========================= */

function addStop() {

    const pkgInput =
        document.getElementById(
            "packageIdInput"
        );

    const addrInput =
        document.getElementById(
            "addressInput"
        );

    let pkgId =
        pkgInput.value.trim();

    let address =
        addrInput.value.trim();

    if(address === "") {

        alert(
            "Digite um endereço."
        );

        return;
    }

    if(pkgId === "") {

        pkgId =
        "#PK-" +
        Math.floor(
            100000 +
            Math.random() * 900000
        );
    }

    const stop = {

        id:
        Date.now().toString(),

        pkgId,

        name: address,

        lat:null,
        lng:null
    };

    stops.push(stop);

    pkgInput.value = "";
    addrInput.value = "";

    renderStops();
    updateStats();
    saveData();
}

/* =========================
   REMOVER PENDENTE
========================= */

function removeStop(id){

    stops =
    stops.filter(
        stop => stop.id !== id
    );

    optimizedStops =
    optimizedStops.filter(
        stop => stop.id !== id
    );

    renderStops();
    updateStats();
    saveData();
}

/* =========================
   RENDER PENDENTES
========================= */

function renderStops() {

    const list =
    document.getElementById(
        "stopsList"
    );

    list.innerHTML = "";

    if(stops.length === 0){

        list.innerHTML =
        `
        <li class="text-slate-500 text-sm">
        Nenhuma entrega pendente
        </li>
        `;

        return;
    }

    stops.forEach(stop => {

        const li =
        document.createElement("li");

        li.className =
        "bg-slate-900 p-3 rounded-xl flex justify-between items-center";

        li.innerHTML = `
        <div>
            <div class="font-bold text-indigo-400">
                ${stop.pkgId}
            </div>

            <div class="text-sm">
                ${stop.name}
            </div>
        </div>

        <button
        onclick="removeStop('${stop.id}')"
        class="bg-red-600 px-3 py-2 rounded-lg">

        X

        </button>
        `;

        list.appendChild(li);

    });
}

/* =========================
   RENDER ENTREGUES
========================= */

function renderDelivered() {

    const list =
    document.getElementById(
        "deliveredList"
    );

    list.innerHTML = "";

    if(deliveredStops.length === 0){

        list.innerHTML =
        `
        <li class="text-slate-500 text-sm">
        Nenhuma entrega concluída
        </li>
        `;

        return;
    }

    deliveredStops.forEach(stop => {

        const li =
        document.createElement("li");

        li.className =
        "bg-emerald-950 p-3 rounded-xl border border-emerald-800";

        li.innerHTML = `
        <div class="flex justify-between">

            <div>

                <div class="font-bold text-emerald-400">
                    ${stop.pkgId}
                </div>

                <div class="text-sm text-white">
                    ${stop.name}
                </div>

            </div>

            <button
            onclick="reopenDelivery('${stop.id}')"
            class="bg-amber-500 text-black px-3 py-2 rounded-lg">

            Reabrir

            </button>

        </div>
        `;

        list.appendChild(li);

    });
}

/* =========================
   REABRIR ENTREGA
========================= */

function reopenDelivery(id){

    const item =
    deliveredStops.find(
        stop => stop.id === id
    );

    if(!item) return;

    deliveredStops =
    deliveredStops.filter(
        stop => stop.id !== id
    );

    stops.push(item);

    renderDelivered();
    renderStops();
    updateStats();
    saveData();
}

/* =========================
   ESTATÍSTICAS
========================= */

function updateStats(){

    document.getElementById(
        "pendingCount"
    ).innerText =
    stops.length;

    document.getElementById(
        "deliveredCount"
    ).innerText =
    deliveredStops.length;

    document.getElementById(
        "totalCount"
    ).innerText =
    stops.length +
    deliveredStops.length;
}

/* =========================
   MARCAR COMO ENTREGUE
========================= */

function completeCurrentDelivery(){

    if(
        optimizedStops.length === 0
    ){
        return;
    }

    const completed =
    optimizedStops.shift();

    deliveredStops.push(
        completed
    );

    stops =
    stops.filter(
        stop =>
        stop.id !== completed.id
    );

    renderStops();
    renderDelivered();
    updateStats();

    saveData();

    updateDeliveryDashboard();

    if(
        optimizedStops.length > 0
    ){

        setTimeout(() => {

            openNextInGoogleMaps();

        },500);

    }
    else{

        alert(
            "Todas as entregas foram concluídas."
        );
    }
}

/* =========================
   EXCLUIR ENTREGA ATUAL
========================= */

function excludeCurrentDelivery(){

    if(
        optimizedStops.length === 0
    ){
        return;
    }

    const removed =
    optimizedStops.shift();

    stops =
    stops.filter(
        stop =>
        stop.id !== removed.id
    );

    renderStops();

    updateStats();

    saveData();

    updateDeliveryDashboard();
}

/* =========================
   IMPORTAÇÃO CSV
========================= */

function importCSV(){

    const file =
    document.getElementById(
        "csvFile"
    ).files[0];

    if(!file){

        alert(
            "Selecione um CSV."
        );

        return;
    }

    const reader =
    new FileReader();

    reader.onload =
    function(event){

        const rows =
        event.target.result
        .split("\n");

        rows.forEach(row => {

            const cols =
            row.split(",");

            if(cols.length >= 2){

                stops.push({

                    id:
                    Date.now() +
                    Math.random()
                    .toString(),

                    pkgId:
                    cols[0].trim(),

                    name:
                    cols[1].trim(),

                    lat:null,
                    lng:null
                });

            }

        });

        renderStops();
        updateStats();
        saveData();

        alert(
            "Importação concluída."
        );
    };

    reader.readAsText(file);
}

/* =========================
   INICIALIZAÇÃO
========================= */

loadData();

            </script>
            <script>

/* ==========================================
   GPS DO MOTORISTA
========================================== */

function getCurrentLocation(){

    const status =
    document.getElementById(
        "gpsStatus"
    );

    status.innerText =
    "Obtendo localização...";

    if(!navigator.geolocation){

        status.innerText =
        "GPS não suportado";

        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            currentLatitude =
            position.coords.latitude;

            currentLongitude =
            position.coords.longitude;

            status.innerText =
            `Lat: ${currentLatitude.toFixed(5)}
             | Lng: ${currentLongitude.toFixed(5)}`;

        },

        function(){

            status.innerText =
            "Falha ao obter GPS";
        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );
}

/* ==========================================
   GEOCODIFICAÇÃO OSM
========================================== */

async function fetchCoordinates(address){

    try{

        const response =
        await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`
        );

        const data =
        await response.json();

        if(data.length > 0){

            return {

                lat:
                parseFloat(data[0].lat),

                lng:
                parseFloat(data[0].lon)

            };
        }

    }catch(error){

        console.error(error);
    }

    return null;
}

/* ==========================================
   DISTÂNCIA HAVERSINE
========================================== */

function calculateDistance(
    lat1,
    lon1,
    lat2,
    lon2
){

    const R = 6371;

    const dLat =
    (lat2 - lat1) *
    Math.PI / 180;

    const dLon =
    (lon2 - lon1) *
    Math.PI / 180;

    const a =
    Math.sin(dLat/2) *
    Math.sin(dLat/2)
    +
    Math.cos(lat1*Math.PI/180)
    *
    Math.cos(lat2*Math.PI/180)
    *
    Math.sin(dLon/2)
    *
    Math.sin(dLon/2);

    const c =
    2 *
    Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R * c;
}

/* ==========================================
   ROTEIRIZAÇÃO PROFISSIONAL
========================================== */

async function optimizeRouteLocal(){

    if(stops.length === 0){

        alert(
            "Adicione entregas primeiro."
        );

        return;
    }

    if(
        currentLatitude === null ||
        currentLongitude === null
    ){

        alert(
            "Atualize o GPS antes."
        );

        return;
    }

    for(let stop of stops){

        if(
            stop.lat === null
        ){

            const coords =
            await fetchCoordinates(
                stop.name
            );

            if(coords){

                stop.lat =
                coords.lat;

                stop.lng =
                coords.lng;
            }
        }
    }

    let unvisited =
    [...stops];

    let currentPoint = {

        lat:currentLatitude,
        lng:currentLongitude

    };

    let route = [];

    while(
        unvisited.length > 0
    ){

        let nearestIndex = 0;

        let nearestDistance =
        Infinity;

        for(
            let i = 0;
            i < unvisited.length;
            i++
        ){

            const stop =
            unvisited[i];

            const dist =
            calculateDistance(

                currentPoint.lat,
                currentPoint.lng,

                stop.lat,
                stop.lng

            );

            if(
                dist <
                nearestDistance
            ){

                nearestDistance =
                dist;

                nearestIndex =
                i;
            }
        }

        const nextStop =
        unvisited.splice(
            nearestIndex,
            1
        )[0];

        route.push(
            nextStop
        );

        currentPoint = {

            lat:nextStop.lat,
            lng:nextStop.lng
        };
    }

    optimizedStops =
    route;

    saveData();

    updateDeliveryDashboard();

    alert(
        "Rota otimizada com sucesso."
    );
}

/* ==========================================
   DASHBOARD DA ENTREGA
========================================== */

function updateDeliveryDashboard(){

    const panel =
    document.getElementById(
        "currentDeliveryPanel"
    );

    const routeList =
    document.getElementById(
        "routeTimeline"
    );

    if(
        optimizedStops.length === 0
    ){

        panel.classList.add(
            "hidden"
        );

        routeList.innerHTML =
        `
        <div class="text-slate-500">
        Nenhuma rota ativa.
        </div>
        `;

        return;
    }

    panel.classList.remove(
        "hidden"
    );

    const current =
    optimizedStops[0];

    document.getElementById(
        "currentPkgId"
    ).innerText =
    current.pkgId;

    document.getElementById(
        "currentAddress"
    ).innerText =
    current.name;

    routeList.innerHTML = "";

    optimizedStops.forEach(

        (stop,index)=>{

            const item =
            document.createElement(
                "div"
            );

            item.className =
            "bg-slate-900 p-3 rounded-xl";

            item.innerHTML =
            `
            <div class="text-indigo-400 font-bold">
            ${index+1}
            </div>

            <div class="font-bold">
            ${stop.pkgId}
            </div>

            <div class="text-sm">
            ${stop.name}
            </div>
            `;

            routeList.appendChild(
                item
            );
        }
    );
}

/* ==========================================
   GOOGLE MAPS
========================================== */

function openNextInGoogleMaps(){

    if(
        optimizedStops.length === 0
    ){
        return;
    }

    const stop =
    optimizedStops[0];

    const url =
    `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stop.name)}`;

    window.open(
        url,
        "_blank"
    );
}

/* ==========================================
   OCR - ABRIR CÂMERA
========================================== */

async function openScanner(){

    try{

        videoStream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                facingMode:"environment"
            }

        });

        document
        .getElementById(
            "scannerModal"
        )
        .classList
        .remove("hidden");

        document
        .getElementById(
            "videoPreview"
        )
        .srcObject =
        videoStream;

    }
    catch(error){

        alert(
            "Erro ao abrir câmera."
        );
    }
}

/* ==========================================
   FECHAR CÂMERA
========================================== */

function closeScanner(){

    if(videoStream){

        videoStream
        .getTracks()
        .forEach(
            track =>
            track.stop()
        );
    }

    document
    .getElementById(
        "scannerModal"
    )
    .classList
    .add("hidden");
}

/* ==========================================
   OCR TESSERACT
========================================== */

async function captureAndProcess(){

    const video =
    document.getElementById(
        "videoPreview"
    );

    const canvas =
    document.getElementById(
        "hiddenCanvas"
    );

    const ctx =
    canvas.getContext("2d");

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    ctx.drawImage(
        video,
        0,
        0
    );

    try{

        const result =
        await Tesseract
        .recognize(
            canvas,
            "por"
        );

        const text =
        result.data.text
        .trim();

        if(
            text.length > 3
        ){

            document
            .getElementById(
                "addressInput"
            )
            .value =
            text;

            closeScanner();

            alert(
                "Texto capturado."
            );
        }
        else{

            alert(
                "Texto não identificado."
            );
        }

    }
    catch(error){

        alert(
            "Falha no OCR."
        );
    }
}

/* ==========================================
   INICIALIZAÇÃO
========================================== */

window.onload = () => {

    getCurrentLocation();

    updateStats();

    renderStops();

    renderDelivered();

    updateDeliveryDashboard();

    lucide.createIcons();
};

</script>
